<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Analytics ChatBot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background:#0b1220; color:#fff; padding:24px;}
.header{display:flex;gap:12px;margin-bottom:24px;}
.logo{width:38px;height:38px;background:#22c55e;border-radius:8px;display:flex;align-items:center;justify-content:center;color:black;font-weight:bold;}
.input-row{display:flex;gap:8px;margin-bottom:16px;}
input{flex:1;padding:10px;border-radius:6px;border:1px solid #374151;background:#1f2937;color:#fff;}
button{padding:10px 16px;border-radius:6px;border:none;cursor:pointer;}
.primary{background:#22c55e;color:black;}
.chips{margin-bottom:20px;}
.chip{background:#1f2937;border:1px solid #374151;padding:6px 10px;margin:4px;border-radius:6px;font-size:12px;cursor:pointer;}
.chip:hover{background:#374151;}
.panel{background:#111827;border:1px solid #1f2937;border-radius:8px;margin-top:16px;}
.panel-header{background:#1f2937;padding:8px 14px;font-size:12px;color:#9ca3af;}
.panel-body{padding:14px;font-size:13px;line-height:1.6;}
.panel-body b{color:#22c55e;}
.loading{color:#6b7280;padding:14px;}
.error{color:#f87171;}
</style>
</head>

<body>

<div class="header">
<div class="logo">AI</div>
<div>
<div>AI Analytics ChatBot</div>
<div style="font-size:12px;color:#9ca3af;">BigQuery | Conversational Analytics API</div>
</div>
</div>

<div class="input-row">
<input id="q" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') send()"/>
<button class="primary" onclick="send()" id="sendBtn">Send</button>
</div>

<div class="chips">
<button class="chip" onclick="quick('Top channels by spend last 7 days')">Top channels</button>
<button class="chip" onclick="quick('ROAS by channel last 30 days')">ROAS</button>
<button class="chip" onclick="quick('Show spend trend over last 30 days')">Spend trend</button>
<button class="chip" onclick="quick('Top platforms by spend')">Platforms</button>
<button class="chip" onclick="quick('Which campaign has the best conversion rate?')">Best conversion</button>
</div>

<div id="results">
<div class="panel"><div class="panel-body">Ask something ↑</div></div>
</div>

<script>
let conversationId=null;

function quick(text){
document.getElementById("q").value=text;
send();
}

function setLoading(on){
const btn=document.getElementById("sendBtn");
btn.disabled=on;
btn.innerText=on?"Thinking...":"Send";

if(on){
document.getElementById("results").innerHTML=
'<div class="panel"><div class="loading">Querying...</div></div>';
}
}

function format(text){
if(!text) return "No response";

// bold
text=text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
// bullets
text=text.replace(/^- (.*)$/gm,'<li>$1</li>');

if(text.includes("<li>")){
text="<ul>"+text+"</ul>";
}
return text;
}

async function send(){
const q=document.getElementById("q").value.trim();
if(!q) return;

setLoading(true);

try{
const body={message:q};
if(conversationId) body.conversationId=conversationId;

const res=await fetch("https://procreate-squint-thwarting.ngrok-free.dev/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

const d=await res.json();
if(d.conversationId) conversationId=d.conversationId;

document.getElementById("results").innerHTML=
'<div class="panel"><div class="panel-header">Answer</div><div class="panel-body">'+format(d.insights)+'</div></div>';

}catch(err){
document.getElementById("results").innerHTML=
'<div class="panel"><div class="panel-header">Error</div><div class="panel-body error">'+err.message+'</div></div>';
}

setLoading(false);
}
</script>

</body>
</html>
