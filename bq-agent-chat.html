<body>

<div class="header">
  <div class="logo">AI</div>
  <div>
    <div>AI Analytics ChatBot</div>
    <div style="font-size:12px;color:#9ca3af;">BigQuery | Conversational Analytics</div>
  </div>
</div>

<div class="input-row">
  <input id="q" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') send()" />
  <button class="primary" onclick="send()" id="sendBtn">Send</button>
</div>

<div id="results">
  <div class="panel">
    <div class="panel-body">Ask a question ↑</div>
  </div>
</div>

<script>
let conversationId = null;

function setLoading(on){
  const btn = document.getElementById("sendBtn");
  btn.disabled = on;
  btn.innerText = on ? "Thinking..." : "Send";
}

async function send(){
  const q = document.getElementById("q").value.trim();
  if(!q) return;

  setLoading(true);

  try{
    const body = { message: q };
    if(conversationId) body.conversationId = conversationId;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const res = await fetch("https://procreate-squint-thwarting.ngrok-free.app/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body),
      signal: controller.signal
    });

    clearTimeout(timeout);

    const d = await res.json();
    if(d.conversationId) conversationId = d.conversationId;

    document.getElementById("results").innerHTML = `
      <div class="panel">
        <div class="panel-header">Answer</div>
        <div class="panel-body">${d.insights || "No response"}</div>
      </div>`;

  } catch(err){
    document.getElementById("results").innerHTML = `
      <div class="panel">
        <div class="panel-header">Connection Error</div>
        <div class="panel-body error-body">
Could not reach backend server

Make sure BOTH are running:
1. node server.js
2. ngrok http 3000

Backend:
https://procreate-squint-thwarting.ngrok-free.app

Error: ${err.message}
        </div>
      </div>`;
  }

  setLoading(false);
}
</script>

</body>
