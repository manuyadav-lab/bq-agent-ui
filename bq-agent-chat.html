<body>

  <div class="header">
    <div class="logo">AI</div>
    <div>
      <div class="title">AI Analytics ChatBot</div>
      <div class="subtitle">BigQuery | Conversational Analytics API</div>
    </div>
  </div>

  <div class="input-row">
    <input id="q" placeholder="Ask anything about your data..." onkeydown="if(event.key==='Enter') send()" />
    <button class="primary" id="sendBtn" onclick="send()">Send</button>
  </div>

  <div class="result-area" id="results">
    <div class="panel">
      <div class="panel-body">Ask a question above to get started ↑</div>
    </div>
  </div>

  <script>
    let conversationId = null;

    function setLoading(on) {
      const btn = document.getElementById("sendBtn");
      btn.disabled = on;
      btn.textContent = on ? "Thinking..." : "Send";

      if (on) {
        document.getElementById("results").innerHTML = `
          <div class="panel">
            <div class="loading">Querying your data...</div>
          </div>`;
      }
    }

    async function send() {
      const q = document.getElementById("q").value.trim();
      if (!q) return;

      setLoading(true);

      try {
        const body = { message: q };
        if (conversationId) body.conversationId = conversationId;

        const res = await fetch("https://procreate-squint-thwarting.ngrok-free.dev/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const d = await res.json();
        if (d.conversationId) conversationId = d.conversationId;

        document.getElementById("results").innerHTML = `
          <div class="panel">
            <div class="panel-header">Answer</div>
            <div class="panel-body">${d.insights || "No response"}</div>
          </div>`;

      } catch (err) {
        document.getElementById("results").innerHTML = `
          <div class="panel">
            <div class="panel-header">Connection Error</div>
            <div class="panel-body error-body">
Could not reach backend server

Make sure BOTH are running:
1. node server.js
2. ngrok http 3000

Backend:
https://procreate-squint-thwarting.ngrok-free.dev

Error: ${err.message}
            </div>
          </div>`;
      } finally {
        setLoading(false);
      }
    }
  </script>

</body>
</html>
